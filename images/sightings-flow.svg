<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="760" height="440" fill="#fafaf7"/>

  <!-- column labels -->
  <text x="100" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#555">YOU</text>
  <text x="220" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#555">YOUR AGENT</text>
  <text x="380" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#555">PEOPLE YOU TRUST</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#888" font-style="italic">whose sightings you read</text>
  <text x="600" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#555">POSTS THEY HAVE SIGHTED</text>
  <text x="600" y="46" text-anchor="middle" font-size="11" fill="#888" font-style="italic">each entry with its why</text>

  <!-- You -->
  <circle cx="100" cy="220" r="36" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="100" y="226" text-anchor="middle" font-size="14" fill="#222">You</text>

  <!-- Your agent -->
  <rect x="180" y="190" width="80" height="60" rx="6" fill="#eef2f0" stroke="#222" stroke-width="2"/>
  <text x="220" y="216" text-anchor="middle" font-size="13" fill="#222">Your</text>
  <text x="220" y="232" text-anchor="middle" font-size="13" fill="#222">agent</text>

  <line x1="138" y1="220" x2="178" y2="220" stroke="#333" stroke-width="1.5"/>

  <!-- Trusted readers -->
  <circle cx="380" cy="110" r="28" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="380" y="116" text-anchor="middle" font-size="12" fill="#222">Alice</text>

  <circle cx="380" cy="220" r="28" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="380" y="226" text-anchor="middle" font-size="12" fill="#222">Bo</text>

  <circle cx="380" cy="330" r="28" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="380" y="336" text-anchor="middle" font-size="12" fill="#222">Cyn</text>

  <!-- agent → readers -->
  <line x1="262" y1="208" x2="354" y2="125" stroke="#888" stroke-width="1.5"/>
  <line x1="262" y1="220" x2="354" y2="220" stroke="#888" stroke-width="1.5"/>
  <line x1="262" y1="232" x2="354" y2="315" stroke="#888" stroke-width="1.5"/>

  <!-- Alice's sightings -->
  <rect x="470" y="70" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="87" font-size="11" fill="#444">post by Diane</text>
  <text x="682" y="87" text-anchor="end" font-size="11" fill="#363">positive</text>

  <rect x="470" y="100" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="117" font-size="11" fill="#444">post by Erkan</text>
  <text x="682" y="117" text-anchor="end" font-size="11" fill="#888">neutral</text>

  <line x1="408" y1="110" x2="468" y2="82" stroke="#bbb" stroke-width="1"/>
  <line x1="408" y1="110" x2="468" y2="112" stroke="#bbb" stroke-width="1"/>

  <!-- Bo's sightings -->
  <rect x="470" y="180" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="197" font-size="11" fill="#444">post by Fae</text>
  <text x="682" y="197" text-anchor="end" font-size="11" fill="#363">positive</text>

  <rect x="470" y="210" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="227" font-size="11" fill="#444">post by Diane</text>
  <text x="682" y="227" text-anchor="end" font-size="11" fill="#363">positive</text>

  <rect x="470" y="240" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="257" font-size="11" fill="#444">post by Gus</text>
  <text x="682" y="257" text-anchor="end" font-size="11" fill="#933">negative</text>

  <line x1="408" y1="220" x2="468" y2="192" stroke="#bbb" stroke-width="1"/>
  <line x1="408" y1="220" x2="468" y2="222" stroke="#bbb" stroke-width="1"/>
  <line x1="408" y1="220" x2="468" y2="252" stroke="#bbb" stroke-width="1"/>

  <!-- Cyn's sightings -->
  <rect x="470" y="300" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="317" font-size="11" fill="#444">post by Hina</text>
  <text x="682" y="317" text-anchor="end" font-size="11" fill="#363">positive</text>

  <rect x="470" y="330" width="220" height="24" rx="3" fill="#ffffff" stroke="#999"/>
  <text x="478" y="347" font-size="11" fill="#444">post by Jens</text>
  <text x="682" y="347" text-anchor="end" font-size="11" fill="#666">known</text>

  <line x1="408" y1="330" x2="468" y2="312" stroke="#bbb" stroke-width="1"/>
  <line x1="408" y1="330" x2="468" y2="342" stroke="#bbb" stroke-width="1"/>

  <!-- bottom note -->
  <text x="380" y="410" text-anchor="middle" font-size="12" fill="#666" font-style="italic">No algorithm picks what you see. Your agent reads through people whose taste you've come to trust.</text>
</svg>
